name: Deploy Health Check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: porth-components
  S3_BUCKET: porth-sam-artifacts-084847995635

jobs:
  deploy:
    name: Deploy via CloudFormation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Verify AWS access
        run: aws sts get-caller-identity

      - name: Ensure S3 bucket exists
        run: |
          aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null || \
          aws s3 mb "s3://$S3_BUCKET" --region "$AWS_REGION"

      - name: Clean up orphaned resources from previous failures
        run: |
          echo "Cleaning up any orphaned resources..."

          # Delete orphaned Lambda if it exists
          aws lambda delete-function --function-name porth-health-check 2>/dev/null && \
            echo "Deleted orphaned Lambda: porth-health-check" || \
            echo "No orphaned Lambda found (ok)"

          # Delete orphaned IAM role if it exists
          # First detach managed policies, then delete
          for policy in $(aws iam list-attached-role-policies --role-name porth-health-check-role --query 'AttachedPolicies[].PolicyArn' --output text 2>/dev/null); do
            aws iam detach-role-policy --role-name porth-health-check-role --policy-arn "$policy" 2>/dev/null
          done
          aws iam delete-role --role-name porth-health-check-role 2>/dev/null && \
            echo "Deleted orphaned IAM role: porth-health-check-role" || \
            echo "No orphaned IAM role found (ok)"

      - name: Clean up failed stack if needed
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Current stack status: $STACK_STATUS"

          if [[ "$STACK_STATUS" == "DOES_NOT_EXIST" ]] || \
             [[ "$STACK_STATUS" == "CREATE_COMPLETE" ]] || \
             [[ "$STACK_STATUS" == "UPDATE_COMPLETE" ]]; then
            echo "Stack is in a good state or does not exist. Proceeding."
            exit 0
          fi

          # If stack is in ROLLBACK_FAILED, try to continue the rollback first
          if [[ "$STACK_STATUS" == *ROLLBACK_FAILED* ]]; then
            echo "Attempting continue-update-rollback..."
            aws cloudformation continue-update-rollback \
              --stack-name "$STACK_NAME" 2>/dev/null || true
            sleep 10
          fi

          # Delete the stack
          echo "Deleting stack..."
          aws cloudformation delete-stack --stack-name "$STACK_NAME"
          echo "Waiting for deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name "$STACK_NAME" 2>/dev/null && {
            echo "Stack deleted successfully."
            exit 0
          }

          # If still stuck, force delete with retain
          echo "Trying force-delete with --retain-resources..."
          STUCK=$(aws cloudformation describe-stack-resources \
            --stack-name "$STACK_NAME" \
            --query "StackResources[?ResourceStatus=='DELETE_FAILED'].LogicalResourceId" \
            --output text 2>/dev/null || echo "")
          if [ -n "$STUCK" ]; then
            aws cloudformation delete-stack \
              --stack-name "$STACK_NAME" \
              --retain-resources $STUCK
            aws cloudformation wait stack-delete-complete \
              --stack-name "$STACK_NAME" || {
              echo "ERROR: Could not delete stack."
              exit 1
            }
          fi
          echo "Stack cleaned up."

      - name: Package CloudFormation template
        run: |
          aws cloudformation package \
            --template-file template.yml \
            --s3-bucket "$S3_BUCKET" \
            --s3-prefix "porth" \
            --output-template-file packaged.yml

      - name: Deploy CloudFormation stack
        id: deploy
        run: |
          aws cloudformation deploy \
            --template-file packaged.yml \
            --stack-name "$STACK_NAME" \
            --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset \
            2>&1 | tee /tmp/cf-deploy.log
          exit ${PIPESTATUS[0]}

      - name: Print deploy error on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "::group::CloudFormation Deploy Log"
          cat /tmp/cf-deploy.log 2>/dev/null || echo "No log file found"
          echo "::endgroup::"
          echo ""
          echo "::error::CloudFormation stack creation failed. Events:"
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "StackEvents[?ResourceStatus=='CREATE_FAILED' || ResourceStatus=='UPDATE_FAILED'].{Resource: LogicalResourceId, Status: ResourceStatus, Reason: ResourceStatusReason}" \
            --output table 2>/dev/null || echo "Could not fetch CF events"

      - name: Get outputs
        if: success()
        id: stack
        run: |
          HEALTH_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='HealthCheckUrl'].OutputValue | [0]" \
            --output text)
          echo "health_url=$HEALTH_URL" >> "$GITHUB_OUTPUT"
          echo "Health URL: $HEALTH_URL"

      - name: Smoke test
        if: success()
        run: |
          URL="${{ steps.stack.outputs.health_url }}"
          echo "Testing: $URL"

          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" "$URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed (attempt $i)"
              cat /tmp/response.json | python3 -m json.tool
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE — retrying in 5s..."
            sleep 5
          done

          echo "FAILED after 5 attempts"
          cat /tmp/response.json 2>/dev/null
          exit 1
