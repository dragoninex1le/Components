AWSTemplateFormatVersion: '2010-09-09'
Description: Porth common components — pipeline validation

Parameters:
  LambdaRoleArn:
    Type: String
    Description: ARN of the IAM role for the Lambda function

Resources:
  HealthCheckFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: handler.handler
      Code: lambdas/health_check/
      Role: !Ref LambdaRoleArn
      Timeout: 10
      MemorySize: 128

  PorthApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PorthApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt HealthCheckFunction.Arn
      PayloadFormatVersion: '2.0'

  HealthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PorthApi
      RouteKey: GET /health
      Target: !Sub integrations/${ApiIntegration}

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref PorthApi
      StageName: $default
      AutoDeploy: true

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HealthCheckFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PorthApi}/*

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${PorthApi}.execute-api.${AWS::Region}.amazonaws.com"
  HealthCheckUrl:
    Description: Full health check URL
    Value: !Sub "https://${PorthApi}.execute-api.${AWS::Region}.amazonaws.com/health"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt HealthCheckFunction.Arn
