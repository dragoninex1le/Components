AWSTemplateFormatVersion: '2010-09-09'
Description: Porth common components — pipeline validation

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: porth-health-check-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HealthCheckFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: porth-health-check
      Runtime: python3.12
      Handler: handler.handler
      Code: lambdas/health_check/
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128

  PorthApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: porth-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PorthApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt HealthCheckFunction.Arn
      PayloadFormatVersion: '2.0'

  HealthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PorthApi
      RouteKey: GET /health
      Target: !Sub integrations/${ApiIntegration}

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref PorthApi
      StageName: $default
      AutoDeploy: true

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HealthCheckFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PorthApi}/*

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${PorthApi}.execute-api.${AWS::Region}.amazonaws.com"
  HealthCheckUrl:
    Description: Full health check URL
    Value: !Sub "https://${PorthApi}.execute-api.${AWS::Region}.amazonaws.com/health"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt HealthCheckFunction.Arn
