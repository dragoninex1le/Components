AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Porth common components — User Management & Multi-Tenancy infrastructure.
  Includes DynamoDB tables, EventBridge bus, and API endpoints.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        PORTH_USERS_TABLE: !Ref PorthUsersTable
        PORTH_PERMISSIONS_TABLE: !Ref PorthPermissionsTable
        PORTH_ROLES_TABLE: !Ref PorthRolesTable
        PORTH_CLAIM_ROLE_MAPPINGS_TABLE: !Ref PorthClaimRoleMappingsTable
        PORTH_CLAIM_MAPPING_CONFIGS_TABLE: !Ref PorthClaimMappingConfigsTable
        PORTH_EVENT_BUS: !Ref PorthEventBus
        AWS_REGION_NAME: !Ref AWS::Region

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # API Gateway
  # =========================================================================
  PorthApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Amz-Date
          - X-Api-Key
          - X-Amz-Security-Token

  # =========================================================================
  # Lambda Functions
  # =========================================================================
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub porth-health-check-${Environment}
      Handler: handler.handler
      CodeUri: lambdas/health_check/
      Timeout: 10
      MemorySize: 128
      Events:
        HealthGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /health
            Method: GET

  # =========================================================================
  # Porth API Lambda Function
  # =========================================================================
  PorthApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub porth-api-${Environment}
      Handler: app.handler
      CodeUri: lambdas/api/
      Timeout: 30
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PorthUsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PorthPermissionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PorthRolesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PorthClaimRoleMappingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PorthClaimMappingConfigsTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref PorthEventBus
      Events:
        # Root endpoint
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /
            Method: GET
        # Organizations endpoints
        OrganizationsCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /organizations
            Method: POST
        OrganizationsList:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /organizations
            Method: GET
        OrganizationsGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /organizations/{org_id}
            Method: GET
        OrganizationsGetBySlug:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /organizations/slug/{slug}
            Method: GET
        OrganizationsUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /organizations/{org_id}
            Method: PATCH
        # Tenants endpoints
        TenantsCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /tenants
            Method: POST
        TenantsGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /tenants/{tenant_id}
            Method: GET
        TenantsList:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /tenants/organization/{org_id}
            Method: GET
        TenantsUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /tenants/{tenant_id}
            Method: PATCH
        # Users endpoints
        UsersUpsert:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /users/upsert
            Method: POST
        UsersGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /users/{user_id}
            Method: GET
        UsersGetByEmail:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /users/email/{email}/tenant/{tenant_id}
            Method: GET
        UsersList:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /users/organization/{org_id}/tenant/{tenant_id}
            Method: GET
        UsersUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /users/{user_id}
            Method: PATCH
        UsersSuspend:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /users/{user_id}/suspend
            Method: POST
        UsersReactivate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /users/{user_id}/reactivate
            Method: POST
        # Permissions endpoints
        PermissionsRegister:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /permissions
            Method: POST
        PermissionsList:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /permissions
            Method: GET
        PermissionsGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /permissions/{tenant_id}/{app_namespace}/{key}
            Method: GET
        # Roles endpoints
        RolesCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles
            Method: POST
        RolesList:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles/tenant/{tenant_id}
            Method: GET
        RolesGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles/{tenant_id}/{role_id}
            Method: GET
        RolesUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles/{tenant_id}/{role_id}
            Method: PATCH
        RolesDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles/{tenant_id}/{role_id}
            Method: DELETE
        RolesSetPermissions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles/{role_id}/permissions
            Method: PUT
        RolesGetPermissions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles/{role_id}/permissions
            Method: GET
        RolesAssignToUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles/users/{user_id}/tenant/{tenant_id}/roles/{role_id}
            Method: POST
        RolesRemoveFromUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles/users/{user_id}/tenant/{tenant_id}/roles/{role_id}
            Method: DELETE
        RolesGetUserRoles:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /roles/users/{user_id}/tenant/{tenant_id}/roles
            Method: GET
        # Claim role mappings endpoints
        ClaimRoleMappingsCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-role-mappings
            Method: POST
        ClaimRoleMappingsGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-role-mappings/{tenant_id}/{app_namespace}/{mapping_id}
            Method: GET
        ClaimRoleMappingsList:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-role-mappings/tenant/{tenant_id}
            Method: GET
        ClaimRoleMappingsListByNamespace:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-role-mappings/tenant/{tenant_id}/namespace/{app_namespace}
            Method: GET
        ClaimRoleMappingsUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-role-mappings/{tenant_id}/{app_namespace}/{mapping_id}
            Method: PATCH
        ClaimRoleMappingsDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-role-mappings/{tenant_id}/{app_namespace}/{mapping_id}
            Method: DELETE
        # Claim mapping configs endpoints
        ClaimMappingConfigsCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-mapping-configs
            Method: POST
        ClaimMappingConfigsGetLatest:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-mapping-configs/{tenant_id}/{app_namespace}/latest
            Method: GET
        ClaimMappingConfigsListVersions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-mapping-configs/{tenant_id}/{app_namespace}/versions
            Method: GET
        ClaimMappingConfigsGetVersion:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-mapping-configs/{tenant_id}/{app_namespace}/{version}
            Method: GET
        ClaimMappingConfigsRollback:
          Type: HttpApi
          Properties:
            ApiId: !Ref PorthApi
            Path: /claim-mapping-configs/{tenant_id}/{app_namespace}/rollback/{version}
            Method: POST

  # =========================================================================
  # EventBridge
  # =========================================================================
  PorthEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub porth-events-${Environment}

  # =========================================================================
  # DynamoDB Tables
  # =========================================================================

  # -------------------------------------------------------------------------
  # porth-users: Single-table design for Organization, Tenant, User entities
  #   and DynamoDB atomic counter items (COUNTER#ORG, COUNTER#TENANT).
  #
  # Main table key: PK (S), SK (S)  — uppercase
  # GSI1: gsi1pk / gsi1sk — org-slug lookup, tenant listing, user external_id
  # GSI2: gsi2pk / gsi2sk — user email lookup by tenant
  # GSI3: gsi3pk / gsi3sk — list users by org+tenant
  # -------------------------------------------------------------------------
  PorthUsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub porth-users-${Environment}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
        - AttributeName: gsi3pk
          AttributeType: S
        - AttributeName: gsi3sk
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: gsi2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: gsi3
          KeySchema:
            - AttributeName: gsi3pk
              KeyType: HASH
            - AttributeName: gsi3sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Porth
        - Key: Component
          Value: UserManagement
        - Key: Environment
          Value: !Ref Environment

  # -------------------------------------------------------------------------
  # porth-permissions: Permission registration and listing.
  #   Stores namespaced permissions scoped to tenant.
  #
  # Main table key: pk (S), sk (S)  — lowercase
  # GSI1: gsi1pk / gsi1sk — browse by tenant and category
  #
  # Access patterns:
  #   pk=TENANT#{id}#NS#{namespace}, sk=PERM#{key}  → single permission
  #   pk=TENANT#{id}#NS#{namespace}                  → all in namespace
  #   gsi1pk=TENANT#{id}                              → all in tenant
  #   gsi1pk=TENANT#{id}, gsi1sk begins CAT#          → by category
  # -------------------------------------------------------------------------
  PorthPermissionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub porth-permissions-${Environment}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Porth
        - Key: Component
          Value: Permissions
        - Key: Environment
          Value: !Ref Environment

  # -------------------------------------------------------------------------
  # porth-roles: Stores Role, RolePermission, and UserRole entities.
  #   Single-table design with three item types sharing the same table.
  #
  # Main table key: pk (S), sk (S)  — lowercase
  # GSI1: gsi1pk / gsi1sk — list user-role assignments by tenant
  #
  # Item types and access patterns:
  #   Role:           pk=TENANT#{id}, sk=ROLE#{id}
  #   RolePermission: pk=ROLE#{id}, sk=PERM#{key}
  #   UserRole:       pk=USER#{id}#TENANT#{id}, sk=ROLE#{id}
  #                   gsi1pk=TENANT#{id}, gsi1sk=USERROLE#{user_id}
  # -------------------------------------------------------------------------
  PorthRolesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub porth-roles-${Environment}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Porth
        - Key: Component
          Value: Roles
        - Key: Environment
          Value: !Ref Environment

  # -------------------------------------------------------------------------
  # porth-claim-role-mappings: Maps IdP JWT claims to internal roles.
  #   Per-tenant, per-namespace claim-to-role mapping rules with priority.
  #
  # Main table key: pk (S), sk (S)  — lowercase
  # GSI1: gsi1pk / gsi1sk — list all mappings by tenant
  #
  # Access patterns:
  #   pk=TENANT#{id}#NS#{namespace}, sk=MAPPING#{id}  → single mapping
  #   pk=TENANT#{id}#NS#{namespace}                    → all in namespace
  #   gsi1pk=TENANT#{id}                                → all in tenant
  # -------------------------------------------------------------------------
  PorthClaimRoleMappingsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub porth-claim-role-mappings-${Environment}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Porth
        - Key: Component
          Value: ClaimRoleMappings
        - Key: Environment
          Value: !Ref Environment

  # -------------------------------------------------------------------------
  # porth-claim-mapping-configs: Versioned claim field transformation configs.
  #   Stores both human-readable mapping_source and compiled_ops (execution-
  #   ready operations) with version history for rollback.
  #
  # Main table key: PK (S), SK (S)  — uppercase
  # GSI1: gsi1pk / gsi1sk — list versions across namespaces by tenant
  #
  # Access patterns:
  #   PK=TENANT#{id}#NS#{namespace}, SK=VERSION#{ver}  → specific version
  #   PK=TENANT#{id}#NS#{namespace}                     → all versions
  #   gsi1pk=TENANT#{id}                                 → all in tenant
  # -------------------------------------------------------------------------
  PorthClaimMappingConfigsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub porth-claim-mapping-configs-${Environment}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Porth
        - Key: Component
          Value: ClaimMappingConfigs
        - Key: Environment
          Value: !Ref Environment

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${PorthApi}.execute-api.${AWS::Region}.amazonaws.com"
  HealthCheckUrl:
    Description: Full health check URL
    Value: !Sub "https://${PorthApi}.execute-api.${AWS::Region}.amazonaws.com/health"
  HealthCheckFunctionArn:
    Description: Health check Lambda function ARN
    Value: !GetAtt HealthCheckFunction.Arn
  PorthApiFunctionArn:
    Description: Porth API Lambda function ARN
    Value: !GetAtt PorthApiFunction.Arn
  PorthApiUrl:
    Description: Porth API base URL
    Value: !Sub "https://${PorthApi}.execute-api.${AWS::Region}.amazonaws.com"
  PorthApiDocsUrl:
    Description: Porth API OpenAPI documentation (Swagger UI)
    Value: !Sub "https://${PorthApi}.execute-api.${AWS::Region}.amazonaws.com/docs"

  # EventBridge
  EventBusName:
    Description: EventBridge bus name for porth domain events
    Value: !Ref PorthEventBus
  EventBusArn:
    Description: EventBridge bus ARN
    Value: !GetAtt PorthEventBus.Arn

  # DynamoDB Tables
  UsersTableName:
    Description: DynamoDB table for organizations, tenants, and users
    Value: !Ref PorthUsersTable
  UsersTableArn:
    Description: Users table ARN (for IAM policies)
    Value: !GetAtt PorthUsersTable.Arn
  PermissionsTableName:
    Description: DynamoDB table for permissions
    Value: !Ref PorthPermissionsTable
  PermissionsTableArn:
    Description: Permissions table ARN (for IAM policies)
    Value: !GetAtt PorthPermissionsTable.Arn
  RolesTableName:
    Description: DynamoDB table for roles, role-permissions, and user-roles
    Value: !Ref PorthRolesTable
  RolesTableArn:
    Description: Roles table ARN (for IAM policies)
    Value: !GetAtt PorthRolesTable.Arn
  ClaimRoleMappingsTableName:
    Description: DynamoDB table for claim-to-role mappings
    Value: !Ref PorthClaimRoleMappingsTable
  ClaimRoleMappingsTableArn:
    Description: Claim role mappings table ARN (for IAM policies)
    Value: !GetAtt PorthClaimRoleMappingsTable.Arn
  ClaimMappingConfigsTableName:
    Description: DynamoDB table for claim mapping configurations
    Value: !Ref PorthClaimMappingConfigsTable
  ClaimMappingConfigsTableArn:
    Description: Claim mapping configs table ARN (for IAM policies)
    Value: !GetAtt PorthClaimMappingConfigsTable.Arn
